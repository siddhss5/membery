<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Membery — Tile Corner Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0;
    padding: 20px; display: flex; gap: 24px; min-height: 100vh;
  }

  .left-panel { flex: 0 0 auto; }
  .right-panel { flex: 1; min-width: 300px; }

  h1 { font-size: 1.3rem; margin-bottom: 12px; }

  #status {
    background: #16213e; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 12px; font-size: 0.95rem; line-height: 1.5;
  }
  #status .mode { color: #4fc3f7; font-weight: bold; }
  #status .hint { color: #aaa; font-size: 0.85rem; }

  #canvas-wrap {
    position: relative; display: inline-block; cursor: crosshair;
    border: 2px solid #333; border-radius: 4px; overflow: hidden;
    background: #333;
  }
  canvas { display: block; }

  .zoom-lens {
    position: fixed; width: 200px; height: 200px; border: 2px solid #4fc3f7;
    border-radius: 8px; overflow: hidden; pointer-events: none;
    display: none; z-index: 100; background: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .zoom-lens canvas { width: 200px; height: 200px; }

  #controls {
    margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  button {
    background: #0f3460; color: #e0e0e0; border: 1px solid #4fc3f7;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  }
  button:hover { background: #1a4a7a; }
  button:disabled { opacity: 0.4; cursor: default; }

  /* Tile grid on the right */
  .tile-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-top: 12px;
  }
  .tile-thumb {
    position: relative; aspect-ratio: 1; border: 2px solid #333;
    border-radius: 6px; overflow: hidden; cursor: pointer;
    background: #222; display: flex; align-items: center; justify-content: center;
  }
  .tile-thumb img {
    width: 100%; height: 100%; object-fit: contain;
  }
  .tile-thumb.active { border-color: #4fc3f7; }
  .tile-thumb.done { border-color: #4caf50; }
  .tile-thumb .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7); font-size: 0.65rem;
    padding: 2px 4px; text-align: center; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .tile-thumb .check {
    position: absolute; top: 2px; right: 4px; color: #4caf50;
    font-size: 1rem; display: none;
  }
  .tile-thumb.done .check { display: block; }

  #progress {
    margin-bottom: 8px; font-size: 0.9rem; color: #81c784;
  }

  #output {
    margin-top: 16px; background: #0d1117; padding: 12px; border-radius: 8px;
    font-family: monospace; font-size: 0.8rem; white-space: pre-wrap;
    display: none; max-height: 250px; overflow-y: auto;
  }
</style>
</head>
<body>

<div class="left-panel">
  <h1>Tile Corner Tool</h1>

  <div id="status">
    <span class="mode" id="mode-label">Loading...</span><br>
    <span class="hint" id="hint">Click the 4 corners of each tile: TL, TR, BR, BL</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="zoom-lens" id="zoom-lens">
    <canvas id="zoom-canvas" width="200" height="200"></canvas>
  </div>

  <div id="controls">
    <button id="btn-undo" onclick="undoCorner()">Undo (Z)</button>
    <button id="btn-skip" onclick="skipTile()">Skip</button>
    <button id="btn-export" onclick="exportAll()" disabled>Export All</button>
  </div>
</div>

<div class="right-panel">
  <div id="progress">0 / 36 tiles done</div>
  <div class="tile-grid" id="tile-grid"></div>
  <div id="output"></div>
</div>

<script>
const CORNER_LABELS = ['Top-Left', 'Top-Right', 'Bottom-Right', 'Bottom-Left'];
const CORNER_COLORS = ['#ff4444', '#44ff44', '#4444ff', '#ffff44'];

let tileInfo = [];
let currentIdx = 0;
let corners = []; // [{x, y}, ...] for current tile (display coords)
let allCorners = {}; // tileName -> [{x, y}, {x, y}, {x, y}, {x, y}] in padded image coords

let currentImg = null;
let displayScale = 1;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoomLens = document.getElementById('zoom-lens');
const zoomCanvas = document.getElementById('zoom-canvas');
const zoomCtx = zoomCanvas.getContext('2d');

// Load tile info
fetch('tiles_padded/tile_info.json')
  .then(r => r.json())
  .then(info => {
    tileInfo = info;
    buildTileGrid();
    loadTile(0);
  });

function buildTileGrid() {
  const grid = document.getElementById('tile-grid');
  tileInfo.forEach((tile, idx) => {
    const div = document.createElement('div');
    div.className = 'tile-thumb';
    div.id = `thumb-${idx}`;
    div.innerHTML = `
      <img src="tiles_padded/${tile.name}.png" alt="${tile.name}">
      <span class="label">${tile.name}</span>
      <span class="check">&#10003;</span>
    `;
    div.addEventListener('click', () => loadTile(idx));
    grid.appendChild(div);
  });
}

function loadTile(idx) {
  currentIdx = idx;
  corners = [];
  const tile = tileInfo[idx];

  // Highlight active thumb
  document.querySelectorAll('.tile-thumb').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Load padded image
  const img = new Image();
  img.onload = () => {
    currentImg = img;

    // Scale to fit ~500px display
    const maxDim = 500;
    displayScale = Math.min(maxDim / img.width, maxDim / img.height, 1);
    canvas.width = Math.round(img.width * displayScale);
    canvas.height = Math.round(img.height * displayScale);

    // Restore previously saved corners if any
    if (allCorners[tile.name]) {
      corners = allCorners[tile.name].map(c => ({
        x: c.x * displayScale,
        y: c.y * displayScale
      }));
    }

    draw();
    updateStatus();
  };
  img.src = `tiles_padded/${tile.name}.png`;
}

function updateStatus() {
  const tile = tileInfo[currentIdx];
  const modeLabel = document.getElementById('mode-label');

  if (corners.length < 4) {
    modeLabel.textContent = `${tile.name} — click ${CORNER_LABELS[corners.length]} corner`;
  } else {
    modeLabel.textContent = `${tile.name} — done! Click a tile on the right or use arrow keys.`;
  }

  const doneCount = Object.keys(allCorners).length;
  document.getElementById('progress').textContent = `${doneCount} / ${tileInfo.length} tiles done`;
  document.getElementById('btn-export').disabled = doneCount < tileInfo.length;
}

function draw() {
  if (!currentImg) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(currentImg, 0, 0, canvas.width, canvas.height);

  // Draw corners
  corners.forEach((c, i) => {
    ctx.fillStyle = CORNER_COLORS[i];
    ctx.beginPath();
    ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText(CORNER_LABELS[i], c.x + 10, c.y - 8);
  });

  // Draw polygon if we have 2+ corners
  if (corners.length >= 2) {
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (let i = 1; i < corners.length; i++) {
      ctx.lineTo(corners[i].x, corners[i].y);
    }
    if (corners.length === 4) ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

canvas.addEventListener('click', (e) => {
  if (!currentImg || corners.length >= 4) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  corners.push({ x, y });

  if (corners.length === 4) {
    // Save in padded image coords (not display coords)
    const tile = tileInfo[currentIdx];
    allCorners[tile.name] = corners.map(c => ({
      x: Math.round(c.x / displayScale),
      y: Math.round(c.y / displayScale)
    }));

    // Mark thumb as done
    document.getElementById(`thumb-${currentIdx}`).classList.add('done');

    // Auto-advance after short delay
    setTimeout(() => {
      if (currentIdx < tileInfo.length - 1) {
        loadTile(currentIdx + 1);
      }
    }, 400);
  }

  draw();
  updateStatus();
});

// Zoom lens
canvas.addEventListener('mousemove', (e) => {
  if (!currentImg) return;
  const rect = canvas.getBoundingClientRect();
  const dx = e.clientX - rect.left;
  const dy = e.clientY - rect.top;

  zoomLens.style.display = 'block';
  zoomLens.style.left = Math.min(e.clientX + 20, window.innerWidth - 220) + 'px';
  zoomLens.style.top = Math.max(e.clientY - 210, 10) + 'px';

  const zf = 3;
  const sw = 200 / zf, sh = 200 / zf;
  zoomCtx.clearRect(0, 0, 200, 200);
  zoomCtx.imageSmoothingEnabled = false;
  zoomCtx.drawImage(canvas, dx - sw/2, dy - sh/2, sw, sh, 0, 0, 200, 200);

  // Crosshair
  zoomCtx.strokeStyle = '#4fc3f7';
  zoomCtx.lineWidth = 1;
  zoomCtx.setLineDash([4, 4]);
  zoomCtx.beginPath(); zoomCtx.moveTo(100, 0); zoomCtx.lineTo(100, 200); zoomCtx.stroke();
  zoomCtx.beginPath(); zoomCtx.moveTo(0, 100); zoomCtx.lineTo(200, 100); zoomCtx.stroke();
  zoomCtx.setLineDash([]);
});

canvas.addEventListener('mouseleave', () => {
  zoomLens.style.display = 'none';
});

function undoCorner() {
  if (corners.length > 0) {
    corners.pop();
    // Remove saved if we're undoing a completed tile
    const tile = tileInfo[currentIdx];
    delete allCorners[tile.name];
    document.getElementById(`thumb-${currentIdx}`).classList.remove('done');
    draw();
    updateStatus();
  }
}

function skipTile() {
  if (currentIdx < tileInfo.length - 1) {
    loadTile(currentIdx + 1);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'z' || e.key === 'Z') undoCorner();
  if (e.key === 'ArrowRight' || e.key === 'n') {
    if (currentIdx < tileInfo.length - 1) loadTile(currentIdx + 1);
  }
  if (e.key === 'ArrowLeft' || e.key === 'p') {
    if (currentIdx > 0) loadTile(currentIdx - 1);
  }
});

function exportAll() {
  const el = document.getElementById('output');
  el.style.display = 'block';
  el.textContent = JSON.stringify(allCorners, null, 2);

  navigator.clipboard.writeText(JSON.stringify(allCorners)).then(() => {
    document.getElementById('mode-label').textContent = 'Copied to clipboard! Paste into the terminal.';
  }).catch(() => {
    document.getElementById('mode-label').textContent = 'Copy the JSON below and paste into the terminal.';
  });
}
</script>

</body>
</html>
